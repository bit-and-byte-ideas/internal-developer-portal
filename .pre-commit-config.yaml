repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '(\.yarn/|\.md$)'
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args:
          - --fix
          - --config
          - .markdownlint.yaml
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            .angular/
          )

  - repo: local
    hooks:
      # Uses the project's own prettier (same version as `yarn prettier:check` in CI).
      # pass_filenames: true lets pre-commit detect when files are modified by the hook
      # and fail the commit, so unformatted files can never slip through.
      - id: prettier
        name: prettier
        language: system
        entry: yarn prettier --write
        types_or:
          [javascript, jsx, ts, tsx, json, markdown, yaml, html, css, scss]
        pass_filenames: true

      - id: lint-fix
        name: lint-fix
        language: system
        entry: bash -c "yarn backstage-cli repo lint --fix"
        pass_filenames: false

      - id: tsc
        name: tsc
        description: 'Ensures that TypeScript files compile successfully.'
        entry: bash -c "yarn tsc"
        language: node
        types_or: [ts, tsx]
        pass_filenames: false
        args: [--noEmit]
        additional_dependencies: ['typescript@~5.8.0']

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.19.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
